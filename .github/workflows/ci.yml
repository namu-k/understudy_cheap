name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

env:
  CI_NODE_VERSION: "22"
  PNPM_VERSION: "10.6.5"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      windows_native: ${{ steps.detect.outputs.windows_native }}
      macos_native: ${{ steps.detect.outputs.macos_native }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect OS-native impact
        id: detect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base="$BASE_SHA"
            head="$HEAD_SHA"
          elif [[ -n "${BEFORE_SHA:-}" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            base="$BEFORE_SHA"
            head="$HEAD_SHA"
          else
            base="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
            head="$HEAD_SHA"
          fi

          git diff --name-only "$base" "$head" > changed-files.txt
          cat changed-files.txt

          common='^(\.github/workflows/ci\.yml|package\.json|pnpm-lock\.yaml|tsconfig\.base\.json|vitest\.package\.config\.ts|packages/gui/package\.json)$'
          shared_gui='^packages/gui/src/'
          windows='^packages/gui/native/win32/'
          macos='^scripts/check-optional-real-gui\.mjs$'

          if grep -Eq "$common|$shared_gui|$windows" changed-files.txt; then
            echo "windows_native=true" >> "$GITHUB_OUTPUT"
          else
            echo "windows_native=false" >> "$GITHUB_OUTPUT"
          fi

          if grep -Eq "$common|$shared_gui|$macos" changed-files.txt; then
            echo "macos_native=true" >> "$GITHUB_OUTPUT"
          else
            echo "macos_native=false" >> "$GITHUB_OUTPUT"
          fi

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit + integration tests
        if: ${{ github.event_name == 'pull_request' || (github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master') }}
        run: pnpm test

      - name: Unit + integration tests with coverage
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        run: pnpm test:coverage

      - name: Pack check
        run: pnpm pack:check

  test-macos:
    needs:
      - changes
      - validate
    if: ${{ needs.changes.outputs.macos_native == 'true' }}
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: macOS GUI contract tests
        run: >
          pnpm vitest run
          packages/gui/src/__tests__/native-helper.test.ts
          packages/gui/src/__tests__/readiness.test.ts
          packages/gui/src/__tests__/demonstration-recorder.test.ts

  test-windows:
    needs:
      - changes
      - validate
    if: ${{ needs.changes.outputs.windows_native == 'true' }}
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify CMake
        run: cmake --version

      - name: Build Win32 helper
        run: |
          cd packages/gui/native/win32
          cmake -B build -G "Visual Studio 17 2022" -A x64
          cmake --build build --config Release

      - name: Run smoke tests
        run: |
          cd packages/gui/native/win32
          pwsh ./test-smoke.ps1 -BinaryPath .\build\Release\understudy-win32-helper.exe

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: windows-test-artifacts
          path: |
            packages/gui/native/win32/build/
            packages/gui/native/win32/*.json
          retention-days: 7
